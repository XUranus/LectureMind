server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Rewrite all client-side routes to index.html (React SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve gzip-compressed assets when available
    gzip_static on;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Long cache for hashed static bundles; no-cache for index.html and env-config.js
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /env-config.js {
        expires -1;
        add_header Cache-Control "no-store";
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store";
    }
}
